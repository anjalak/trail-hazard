version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trailintel
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trailintel
      REDIS_URL: redis://redis:6379/0
      USE_IN_MEMORY_REPOSITORY: "false"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && celery -A app.jobs.tasks.celery_app worker --loglevel=info"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trailintel
      REDIS_URL: redis://redis:6379/0
      USE_IN_MEMORY_REPOSITORY: "false"
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  beat:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && celery -A app.jobs.tasks.celery_app beat --loglevel=info"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trailintel
      REDIS_URL: redis://redis:6379/0
      USE_IN_MEMORY_REPOSITORY: "false"
    volumes:
      - ./backend:/app
    depends_on:
      - worker

volumes:
  pg_data:
