# TrailIntel: Python 3.11+ is the supported interpreter for the backend
# (aligns with docker-compose `python:3.11-slim` and repository `.python-version`).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (pytest, Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trailintel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d trailintel_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          PYTHONPATH: "."
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trailintel_test
        run: pytest -q

  frontend:
    name: Frontend (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build
